  build-tauri-mac-ios:
    name: Build iOS only (test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      # - name: Build macOS (ARM)
      #   working-directory: web
      #   run: bun run build:macos:arm

      # - name: Add x86_64-apple-darwin target
      #   run: rustup target add x86_64-apple-darwin

      # - name: Build macOS (x64)
      #   working-directory: web
      #   run: bun run build:macos

      # - name: Upload macOS artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: mac-dmg
      #     path: |
      #       web/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
      #       web/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Setup iOS signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Decode certificate
          CERT_PATH=$RUNNER_TEMP/cert.p12
          echo -n "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          
          # Import certificate to keychain
          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          
          # Set key partition list to allow codesign to access the key
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Decode and install provisioning profile
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          
          # Extract profile UUID and name
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)
          
          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          
          # Export environment variables
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV

      - name: Build iOS archive with xcodebuild
        working-directory: web/src-tauri/gen/apple
        run: |
          xcodebuild archive \
            -project app.xcodeproj \
            -scheme app_iOS \
            -configuration Release \
            -archivePath $PWD/build/Parchment.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            DEVELOPMENT_TEAM=QPNGAD5BD2

      - name: Export IPA
        working-directory: web/src-tauri/gen/apple
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/Parchment.xcarchive \
            -exportPath $PWD/build \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: web/src-tauri/gen/apple/build/*.ipa
        continue-on-error: true

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

