name: parchment

volumes:
  server-db:
  server-data:
  redis-data:

services:
  # Redis cache
  parchment-redis:
    container_name: parchment-redis
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Parchment backend server DB
  parchment-db:
    container_name: parchment-db
    image: kartoza/postgis:latest
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - server-db:/var/lib/postgresql/data
      - ./server/scripts/init-postgis.sh:/docker-entrypoint-initdb.d/init-postgis.sh
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Parchment backend (Elysia)
  parchment-server:
    container_name: parchment-server
    image: alexwohlbruck/parchment-server:latest
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@parchment-db:5432/${POSTGRES_DB}
      SERVER_ORIGIN: ${SERVER_ORIGIN}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      GMAIL_EMAIL: ${GMAIL_EMAIL}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      APP_TESTER_EMAIL: ${APP_TESTER_EMAIL}
      REDIS_URL: redis://parchment-redis:6379
    ports:
      - "5000:5000"
    volumes:
      - server-data:/app/data
    depends_on:
      - parchment-db
      - parchment-redis
    restart: unless-stopped

  # Web frontend (Vue)
  parchment-web:
    container_name: parchment-web
    image: alexwohlbruck/parchment-web:latest
    environment:
      VITE_SERVER_ORIGIN: ${SERVER_ORIGIN}
    ports:
      - "5173:5173"
    depends_on:
      - parchment-server
    restart: unless-stopped
