# Optional development overrides
# To use: docker-compose -f docker-compose.yml -f docker-compose.override.yml up

services:
  elasticsearch:
    # Lower memory requirement for development
    environment:
      - 'ES_JAVA_OPTS=-Xms256m -Xmx256m'

  # For development, preconfigure for North Carolina region
  graphhopper:
    environment:
      - JAVA_OPTS=-Xmx512m -Xms512m
    volumes:
      - ./data/osm/north-carolina-latest.osm.pbf:/data/osm/osm.pbf

  # Debugging aid for Pelias
  elasticsearch-dashboard:
    image: kibana:7.17.10
    container_name: elasticsearch-dashboard
    ports:
      - '5601:5601'
    environment:
      - 'ELASTICSEARCH_HOSTS=http://elasticsearch:9200'
    depends_on:
      - elasticsearch
