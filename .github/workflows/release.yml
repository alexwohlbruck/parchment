# Release pipeline: on tag push v*, build Docker images (push to Docker Hub),
# build Tauri apps (Android, macOS, iOS), create GitHub Release with CHANGELOG body and upload assets.
# Requires secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.
# For iOS build: configure Apple code signing (e.g. APPLE_SIGNING_IDENTITY, certificates, provisioning profile).

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: docker.io

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Run web unit tests
        working-directory: web
        run: bun run test -- run

  build-docker:
    needs: [test]
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./web/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            alexwohlbruck/parchment-web:${{ steps.version.outputs.VERSION }}
            alexwohlbruck/parchment-web:latest

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            alexwohlbruck/parchment-server:${{ steps.version.outputs.VERSION }}
            alexwohlbruck/parchment-server:latest

  publish-tauri:
    needs: [test]
    name: Build and release Tauri apps
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'web/src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Read CHANGELOG
        id: changelog
        shell: bash
        run: |
          if [ -f CHANGELOG.md ]; then
            CHANGELOG=$(cat CHANGELOG.md)
          else
            CHANGELOG="Release ${{ github.ref_name }}"
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: web
          tagName: ${{ github.ref_name }}
          releaseName: 'Release ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  publish-android:
    needs: [test]
    name: Build and release Android app
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android NDK
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'web/src-tauri -> target'

      - name: Build web frontend
        working-directory: web
        run: bun run build

      - name: Build Android AAB
        working-directory: web
        run: bun tauri android build --aab

      - name: Upload Android AAB to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: web/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab

  publish-ios:
    needs: [test]
    name: Build and release iOS app
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'web/src-tauri -> target'

      - name: Build web frontend
        working-directory: web
        run: bun run build

      - name: Build iOS IPA
        working-directory: web
        env:
          IOS_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: bun tauri ios build --export-method app-store-connect

      - name: Upload iOS IPA to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: web/src-tauri/gen/apple/build/arm64/*.ipa

  upload-to-stores:
    name: Upload to app stores
    runs-on: ubuntu-latest
    needs: [publish-android]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download Android AAB from release
        run: |
          gh release download ${{ github.ref_name }} -p "*.aab" -D android-aab
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Play Store release notes
        run: |
          mkdir -p play-release-notes
          if [ -f CHANGELOG.md ]; then
            tail -n +7 CHANGELOG.md > play-release-notes/whatsnew-en-US
          else
            echo "Release ${{ github.ref_name }}" > play-release-notes/whatsnew-en-US
          fi

      - name: Upload AAB to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.parchment
          releaseFiles: android-aab/*.aab
          track: ${{ secrets.GOOGLE_PLAY_TRACK || 'internal' }}
          releaseName: ${{ steps.version.outputs.VERSION }}
          whatsNewDirectory: play-release-notes
          status: completed
        continue-on-error: true
