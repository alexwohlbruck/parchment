# Automatically creates a vX.Y.Z tag when code is pushed to main,
# then triggers the full release workflow.
#
# Tags pushed by GITHUB_TOKEN don't trigger `on: push: tags` workflows,
# so we call release.yml directly via workflow_call instead.

name: Tag Release

on:
  push:
    branches: [main]

# The release workflow needs contents:write (GitHub Releases, tauri uploads)
# and id-token:write (Docker Hub OIDC). These must be set at the top level
# because workflow_call inherits the caller's top-level permissions.
permissions:
  contents: write
  id-token: write

jobs:
  tag:
    name: Create release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.TAG }}
      created: ${{ steps.check_tag.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(grep '"version":' web/package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.TAG }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.TAG }}" -m "Release ${{ steps.version.outputs.VERSION }}"
          git push origin "${{ steps.version.outputs.TAG }}"
          echo "Created tag ${{ steps.version.outputs.TAG }}"

  release:
    name: Release
    needs: tag
    if: needs.tag.outputs.created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
    secrets: inherit
