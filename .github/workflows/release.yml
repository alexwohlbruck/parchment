# Release pipeline: on tag push v*, build Docker images (push to Docker Hub),
# build Tauri apps (Android, macOS, iOS), create GitHub Release with CHANGELOG body and upload assets.
# Requires secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.
# For iOS build: configure Apple code signing (e.g. APPLE_SIGNING_IDENTITY, certificates, provisioning profile).

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: docker.io

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Run web unit tests
        working-directory: web
        run: bun run test -- run

  build-docker:
    needs: [test]
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./web/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            alexwohlbruck/parchment-web:${{ steps.version.outputs.VERSION }}
            alexwohlbruck/parchment-web:latest

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            alexwohlbruck/parchment-server:${{ steps.version.outputs.VERSION }}
            alexwohlbruck/parchment-server:latest

  publish-tauri:
    needs: [test]
    name: Build and release Tauri apps
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            bundles: 'dmg'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            bundles: 'dmg'
          - platform: 'ubuntu-22.04'
            target: 'android'
            bundles: 'aab'
          - platform: 'macos-latest'
            target: 'ios'
            bundles: 'ipa'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'web/src-tauri -> target'

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IOS_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        with:
          projectPath: web
          includeRelease: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: '${{ matrix.target }}-[bundle]'
          args: ${{ matrix.target == 'android' && 'android build --aab' || matrix.target == 'ios' && 'ios build --export-method app-store-connect' || format('build --target {0}', matrix.target) }}

      - name: Setup Node for iOS build
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies for iOS
        working-directory: web
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IOS_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        with:
          projectPath: web
          includeRelease: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: 'ios-[bundle]'
          tauriScript: npm run tauri
          args: ios build --export-method app-store-connect

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: |
            web/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            web/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  release:
    name: Create GitHub Release and upload assets
    runs-on: ubuntu-latest
    needs: [publish-tauri]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Play Store release notes
        run: |
          mkdir -p play-release-notes
          tail -n +7 CHANGELOG.md > play-release-notes/whatsnew-en-US

      - name: Upload AAB to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.parchment
          releaseFiles: artifacts/android-aab/*.aab
          track: ${{ secrets.GOOGLE_PLAY_TRACK || 'internal' }}
          releaseName: ${{ steps.version.outputs.VERSION }}
          whatsNewDirectory: play-release-notes
          status: completed
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          files: artifacts/**/*
          fail_on_unmatched_files: false
          draft: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
