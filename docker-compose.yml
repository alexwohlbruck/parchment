# TODO: Publish images for server parchment-server and parchment-web
volumes:
  osm-data:
  server-db:
  server:
  elasticsearch-data:
  graphhopper-data:

services:
  # OSM imported data DB
  osm-db:
    container_name: osm-data
    image: postgis/postgis:latest
    environment:
      POSTGRES_DB: osm_data
      POSTGRES_USER: osm_user
      POSTGRES_PASSWORD: osm_password
    volumes:
      - osm-data:/var/lib/postgresql/data
    ports:
      - '5433:5432'

  # Parchment backend server DB
  server-db:
    container_name: server-db
    image: postgres:latest
    environment:
      POSTGRES_DB: parchment
      POSTGRES_USER: server_user
      POSTGRES_PASSWORD: server_password
    volumes:
      - server-db:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  # Parchment backend (Elysia)
  server:
    container_name: parchment-server
    build:
      context: .
      dockerfile: server/${DOCKERFILE:-Dockerfile.prod}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOCAL_ROUTING_ENGINE: 'graphhopper'
      EXTERNAL_ROUTING_ENGINE_URL: 'https://api.openrouteservice.org/v2/directions/driving-car'
      EXTERNAL_ROUTING_API_KEY: 'your-external-api-key'
      STANDARD_RESPONSE_FORMAT: 'true'
      PELIAS_API_URL: 'http://pelias-api:4000'
      GRAPHHOPPER_API_URL: 'http://graphhopper:8989'
    ports:
      - '5000:5000' # Expose backend to host
      - '${BUN_DEBUG_PORT:-6499}:6499' # Bun debugger
    depends_on:
      - server-db
      - pelias-api
      - graphhopper
    volumes:
      - ./server:/app/server
      - /app/server/node_modules

  # Web frontend (Vue)
  web:
    container_name: parchment-web
    build:
      context: .
      dockerfile: web/${DOCKERFILE:-Dockerfile.prod}
    environment:
      - VITE_SERVER_ORIGIN=${VITE_SERVER_ORIGIN:-http://localhost:5000}
      - VITE_PORT=${VITE_PORT:-5173}
    ports:
      - '5173:${VITE_PORT:-5173}'
    volumes:
      - ./web:/app/web
      - /app/web/node_modules
      - ./server/src/types:/app/server/src/types
    depends_on:
      - server

  # Elasticsearch (replacement for OpenSearch)
  elasticsearch:
    container_name: elasticsearch
    image: elasticsearch:7.17.10
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - '9200:9200'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9200']
      interval: 30s
      timeout: 10s
      retries: 5

  # Pelias API
  pelias-api:
    container_name: pelias-api
    image: pelias/api:master
    restart: always
    environment:
      - PORT=4000
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
    ports:
      - '4000:4000'
    volumes:
      - ./config/pelias:/etc/pelias
    depends_on:
      - elasticsearch
      - libpostal
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/v1/search?text=test']
      interval: 30s
      timeout: 10s
      retries: 3

  # Libpostal (address parser for Pelias)
  libpostal:
    container_name: pelias-libpostal
    image: pelias/libpostal-service:master
    restart: always
    ports:
      - '4400:4400'

  # Pelias Placeholder (administrative hierarchy/boundaries)
  placeholder:
    container_name: pelias-placeholder
    image: pelias/placeholder:master
    restart: always
    environment:
      - PLACEHOLDER_DATA=/data/placeholder
    ports:
      - '4100:4100'
    volumes:
      - ./data/placeholder:/data/placeholder
      - ./config/pelias:/etc/pelias
    depends_on:
      - libpostal

  # Pelias PIP (point-in-polygon service)
  interpolation:
    container_name: pelias-interpolation
    image: pelias/interpolation:master
    restart: always
    environment:
      - INTERPOLATION_DATA=/data/interpolation
    ports:
      - '4300:4300'
    volumes:
      - ./data/interpolation:/data/interpolation
      - ./config/pelias:/etc/pelias
    depends_on:
      - libpostal

  # Polylines service (for roads)
  polylines:
    container_name: pelias-polylines
    image: pelias/polylines:master
    restart: always
    volumes:
      - ./data/polylines:/data/polylines
      - ./data/osm:/data/osm
      - ./config/pelias:/etc/pelias
    depends_on:
      - libpostal
    # Don't start the import automatically - we'll trigger it when needed
    entrypoint: ['tail', '-f', '/dev/null']

  # OpenStreetMap data importer
  openstreetmap:
    container_name: pelias-openstreetmap
    image: pelias/openstreetmap:master
    restart: always
    volumes:
      - ./data/osm:/data/osm
      - ./config/pelias:/etc/pelias
    depends_on:
      - libpostal
    # Don't start the import automatically - we'll trigger it when needed
    entrypoint: ['tail', '-f', '/dev/null']

  # Geonames importer
  geonames:
    container_name: pelias-geonames
    image: pelias/geonames:master
    restart: always
    volumes:
      - ./data/geonames:/data/geonames
      - ./config/pelias:/etc/pelias
    environment:
      - GEONAMES_COUNTRYCODE=US
    depends_on:
      - libpostal
    # Don't start the import automatically - we'll trigger it when needed
    entrypoint: ['tail', '-f', '/dev/null']

  # GraphHopper routing engine
  graphhopper:
    container_name: graphhopper
    image: graphhopper/graphhopper:1.0
    environment:
      - JAVA_OPTS=-Xmx1g -Xms1g
      - JETTY_PORT=8989
    volumes:
      - ./data/graphhopper:/data/graphhopper
      - ./config/graphhopper:/data/graphhopper/config
      - osm-data:/data/osm
    ports:
      - '8989:8989'
    restart: always
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8989/']
      interval: 30s
      timeout: 10s
      retries: 3

  # Martin Tile Server
  martin:
    container_name: martin-tileserver
    image: urbica/martin:latest
    restart: always
    environment:
      - DATABASE_URL=postgres://osm_user:osm_password@osm-db:5432/osm_data
    ports:
      - '3000:3000'
    depends_on:
      - osm-db
