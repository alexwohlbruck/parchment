# Release pipeline: on tag push v*, build Docker images (push to Docker Hub),
# build Tauri apps (Android, macOS, iOS), create GitHub Release with CHANGELOG body and upload assets.
# Requires secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.
# For iOS build: configure Apple code signing (e.g. APPLE_SIGNING_IDENTITY, certificates, provisioning profile).

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: docker.io

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Run web unit tests
        working-directory: web
        run: bun run test -- run

  build-docker:
    needs: [test]
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./web/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            alexwohlbruck/parchment-web:${{ steps.version.outputs.VERSION }}
            alexwohlbruck/parchment-web:latest

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            alexwohlbruck/parchment-server:${{ steps.version.outputs.VERSION }}
            alexwohlbruck/parchment-server:latest

  build-tauri-android:
    needs: [test]
    name: Build Tauri Android (AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build Android AAB
        working-directory: web
        run: bun run build:android

      - name: Upload Android AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: web/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab

  build-tauri-mac-ios:
    needs: [test]
    name: Build Tauri macOS and iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build macOS (ARM)
        working-directory: web
        run: bun run build:macos:arm

      - name: Add x86_64-apple-darwin target
        run: rustup target add x86_64-apple-darwin

      - name: Build macOS (x64)
        working-directory: web
        run: bun run build:macos

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: |
            web/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            web/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Build iOS
        working-directory: web
        run: bun run build:ios
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: web/src-tauri/**/*.ipa
        continue-on-error: true

  release:
    name: Create GitHub Release and upload assets
    runs-on: ubuntu-latest
    needs: [build-tauri-android]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare Play Store release notes
        run: |
          mkdir -p play-release-notes
          tail -n +7 CHANGELOG.md > play-release-notes/whatsnew-en-US

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab

      - name: Upload AAB to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.parchment
          releaseFiles: android-aab/*.aab
          track: ${{ secrets.GOOGLE_PLAY_TRACK || 'internal' }}
          releaseName: ${{ steps.version.outputs.VERSION }}
          whatsNewDirectory: play-release-notes
          status: completed

      - name: Download macOS DMGs
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg

      - name: Download iOS IPA (optional)
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          files: |
            android-aab/*.aab
            mac-dmg/*.dmg
            ios-ipa/*.ipa
          fail_on_unmatched_files: false
          draft: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
