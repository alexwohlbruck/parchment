# TODO: Publish images for server parchment-server and parchment-web
volumes:
  osm-db:
  server-db:
  server:

services:
  # OSM imported data DB
  osm-db:
    container_name: osm-data
    image: postgis/postgis:latest
    environment:
      POSTGRES_DB: osm_data
      POSTGRES_USER: osm_user
      POSTGRES_PASSWORD: osm_password
    volumes:
      - osm-db:/var/lib/postgresql/data
    ports:
      - '5433:5432'

  # Parchment backend server DB
  server-db:
    container_name: server-db
    image: postgres:latest
    environment:
      POSTGRES_DB: parchment
      POSTGRES_USER: server_user
      POSTGRES_PASSWORD: server_password
    volumes:
      - server-db:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  # Parchment backend (Elysia)
  server:
    container_name: parchment-server
    build:
      context: .
      dockerfile: server/${DOCKERFILE:-Dockerfile.prod}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOCAL_ROUTING_ENGINE: 'graphhopper'
      EXTERNAL_ROUTING_ENGINE_URL: 'https://api.openrouteservice.org/v2/directions/driving-car'
      EXTERNAL_ROUTING_API_KEY: 'your-external-api-key'
      STANDARD_RESPONSE_FORMAT: 'true'
    ports:
      - '5000:5000' # Expose backend to host
    depends_on:
      - server-db
    #   - pelias-api
    #   - opensearch
    #   - graphhopper
    #   - martin
    volumes:
      - ./server:/app/server
      - /app/server/node_modules

  # Web frontend (Vue)
  web:
    container_name: parchment-web
    build:
      context: .
      dockerfile: web/${DOCKERFILE:-Dockerfile.prod}
    environment:
      - VITE_SERVER_ORIGIN=${VITE_SERVER_ORIGIN:-http://localhost:5000}
      - VITE_PORT=${VITE_PORT}
    ports:
      - '5173:${VITE_PORT:-5173}'
    volumes:
      - ./web:/app/web
      - /app/web/node_modules
      - ./server/src/types:/app/server/src/types
    depends_on:
      - server

  # Valhalla (Routing Engine)
  valhalla:
    container_name: valhalla
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    ports:
      - 8002:8002
    #build:
    #  context: .
    #  args:
    #    - VALHALLA_UID=1000
    #    - VALHALLA_GID=1000
    volumes:
      - ./valhalla/:/custom_files
      # - ./gtfs_feeds:/gtfs_feeds  # only enable with build_transit=True
    environment:
      # Auto-download PBFs from Geofabrik
      # - tile_urls=https://download.geofabrik.de/europe/andorra-latest.osm.pbf https://download.geofabrik.de/europe/albania-latest.osm.pbf
      - server_threads=10 # determines how many threads will be used to run the valhalla server
      - serve_tiles=True # If True, starts the service. If false, stops after building the graph.
      - use_tiles_ignore_pbf=True # load existing valhalla_tiles.tar directly
      - tileset_name=valhalla_tiles # name of the resulting graph on disk
      - build_elevation=False # build elevation with "True" or "Force": will download only the elevation for areas covered by the graph tiles
      - build_admins=False # build admins db with "True" or "Force"
      - build_time_zones=False # build timezone db with "True" or "Force"
      - build_transit=False # build transit, needs existing GTFS directories mapped to /gtfs_feeds
      - build_tar=True # build an indexed tar file from the tile_dir for faster graph loading times
      - force_rebuild=False # forces a rebuild of the routing tiles with "True"
      - update_existing_config=True # if there are new config entries in the default config, add them to the existing config
      # - path_extension=graphs  # this path will be internally appended to /custom_files; no leading or trailing path separator!
    # adapt to the expected build time
    # healthcheck:
    #   test: curl --fail -s http://localhost:8002/status || exit 1
    #   interval: 1s
    #   retries: 10
    #   start_period: 2s
    #   timeout: 1s

