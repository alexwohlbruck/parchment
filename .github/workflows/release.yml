# Release pipeline: on tag push v*, build all artifacts first, then deploy
# only after ALL builds succeed. This prevents partial releases.
#
# Flow: test → build (docker, tauri, android, ios) → deploy (push images, create release, upload to stores)
#
# Required secrets:
# - DOCKERHUB_USERNAME, DOCKERHUB_TOKEN: Docker Hub credentials
# - APPLE_MACOS_CERTIFICATE_BASE64, APPLE_MACOS_CERTIFICATE_PASSWORD: macOS code signing (Developer ID Application cert)
# - APPLE_CERTIFICATE_BASE64, APPLE_CERTIFICATE_PASSWORD: iOS code signing (Apple Distribution cert)
# - APPLE_API_ISSUER, APPLE_API_KEY, APPLE_API_KEY_CONTENT: App Store Connect API for notarization & upload
# - GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: Google Play upload
# - TAURI_SIGNING_PRIVATE_KEY: Tauri updater signing key (generate with: bunx tauri signer generate)
# - TAURI_SIGNING_PRIVATE_KEY_PASSWORD: Password for the encrypted Tauri updater signing key

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

env:
  REGISTRY: docker.io
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

# ─── PHASE 1: TEST ────────────────────────────────────────────────────────────

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: |
          cd server && bun install --frozen-lockfile
          cd ../web && bun install --frozen-lockfile
      - name: Run tests
        working-directory: web
        run: bun run test -- run

# ─── PHASE 2: BUILD (all in parallel, no publishing) ─────────────────────────

  build-docker:
    needs: [test]
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker
        uses: docker/setup-buildx-action@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${RELEASE_TAG#v}" >> $GITHUB_OUTPUT

      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./web/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: false
          tags: |
            alexwohlbruck/parchment-web:${{ steps.version.outputs.VERSION }}
            alexwohlbruck/parchment-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./server/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: false
          tags: |
            alexwohlbruck/parchment-server:${{ steps.version.outputs.VERSION }}
            alexwohlbruck/parchment-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-tauri:
    needs: [test]
    name: Build desktop app (${{ matrix.target }})
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: |
          cd server && bun install --frozen-lockfile
          cd ../web && bun install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: 'web/src-tauri -> target'

      - name: Install system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup macOS code signing
        if: matrix.platform == 'macos-latest'
        run: |
          if [ -z "${{ secrets.APPLE_MACOS_CERTIFICATE_BASE64 }}" ]; then
            echo "Warning: APPLE_MACOS_CERTIFICATE_BASE64 not set. macOS app will not be signed."
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "${{ secrets.APPLE_MACOS_CERTIFICATE_BASE64 }}" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "${{ secrets.APPLE_MACOS_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | grep "Developer ID Application" | head -1 | grep -o '".*"' | tr -d '"')
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "Error: No 'Developer ID Application' certificate found."
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> $GITHUB_ENV
          echo "APPLE_CERTIFICATE=${{ secrets.APPLE_MACOS_CERTIFICATE_BASE64 }}" >> $GITHUB_ENV
          echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_MACOS_CERTIFICATE_PASSWORD }}" >> $GITHUB_ENV
          if [ -n "${{ secrets.APPLE_API_ISSUER }}" ]; then
            mkdir -p ~/.appstoreconnect/private_keys
            echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
            echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> $GITHUB_ENV
            echo "APPLE_API_KEY=${{ secrets.APPLE_API_KEY }}" >> $GITHUB_ENV
            echo "APPLE_API_KEY_PATH=$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8" >> $GITHUB_ENV
          fi
          rm $CERTIFICATE_PATH

      - name: Build frontend
        working-directory: web
        run: bun run build

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        working-directory: web
        run: bun tauri build ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.target }}
          path: |
            web/src-tauri/target/**/release/bundle/**/*.dmg
            web/src-tauri/target/**/release/bundle/**/*.app.tar.gz
            web/src-tauri/target/**/release/bundle/**/*.app.tar.gz.sig
            web/src-tauri/target/**/release/bundle/**/*.deb
            web/src-tauri/target/**/release/bundle/**/*.AppImage
            web/src-tauri/target/**/release/bundle/**/*.AppImage.tar.gz
            web/src-tauri/target/**/release/bundle/**/*.AppImage.tar.gz.sig
          retention-days: 1

  build-android:
    needs: [test]
    name: Build Android app
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          cd server && bun install --frozen-lockfile
          cd ../web && bun install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android NDK
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/26.1.10909125" >> $GITHUB_ENV

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: 'web/src-tauri -> target'

      - name: Build frontend
        working-directory: web
        run: bun run build

      - name: Build app bundle
        working-directory: web
        run: bun tauri android build --aab

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: web/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          retention-days: 1

  build-ios:
    needs: [test]
    name: Build iOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Install dependencies
        run: |
          cd server && bun install --frozen-lockfile
          cd ../web && bun install --frozen-lockfile

      - name: Install ImageMagick
        run: brew install imagemagick

      - name: Regenerate iOS icons
        working-directory: web
        run: |
          bun tauri icon src-tauri/icons/app-icon.svg --ios-color "#1a1a1a"
          echo "Removing alpha channel from iOS icons..."
          cd src-tauri/gen/apple/Assets.xcassets/AppIcon.appiconset
          for file in *.png; do
            magick "$file" -background "#1a1a1a" -alpha remove -alpha off "$file"
            echo "Flattened: $file"
          done

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: 'web/src-tauri -> target'

      - name: Setup code signing
        run: |
          if [ -n "${{ secrets.APPLE_API_ISSUER }}" ]; then
            echo "Using automatic signing with App Store Connect API"
            mkdir -p ~/.appstoreconnect/private_keys
            echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
            echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> $GITHUB_ENV
            echo "APPLE_API_KEY=${{ secrets.APPLE_API_KEY }}" >> $GITHUB_ENV
            echo "APPLE_API_KEY_PATH=$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8" >> $GITHUB_ENV
          else
            echo "Using manual signing with certificates"
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
            security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
            echo -n "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 --decode -o $CERTIFICATE_PATH
            security import $CERTIFICATE_PATH -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
            security list-keychain -d user -s $KEYCHAIN_PATH
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            echo -n "${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode -o $PP_PATH
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            PP_UUID=$(openssl smime -inform der -verify -noverify -in $PP_PATH 2>/dev/null | plutil -extract UUID raw -)
            cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision
            cd src-tauri/gen/apple
            sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' app.xcodeproj/project.pbxproj
            rm $CERTIFICATE_PATH
            rm $PP_PATH
          fi

      - name: Build frontend
        working-directory: web
        run: bun run build

      - name: Build app bundle
        working-directory: web
        run: bun tauri ios build --export-method app-store-connect

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: web/src-tauri/gen/apple/build/arm64/*.ipa
          retention-days: 1

# ─── PHASE 3: DEPLOY (only after ALL builds succeed) ─────────────────────────

  deploy-docker:
    name: Push Docker images
    needs: [build-docker, build-tauri, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${RELEASE_TAG#v}" >> $GITHUB_OUTPUT

      - name: Build and push web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./web/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            alexwohlbruck/parchment-web:${{ steps.version.outputs.VERSION }}
            alexwohlbruck/parchment-web:latest
          cache-from: type=gha

      - name: Build and push server
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./server/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            alexwohlbruck/parchment-server:${{ steps.version.outputs.VERSION }}
            alexwohlbruck/parchment-server:latest
          cache-from: type=gha

  deploy-github-release:
    name: Create GitHub Release
    needs: [build-docker, build-tauri, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '{tauri-*,android-*,ios-*}'

      - name: Set release title
        id: release_title
        run: |
          if [ -f RELEASE_TITLE ] && [ -s RELEASE_TITLE ]; then
            TITLE=$(tr -d '\n' < RELEASE_TITLE)
            echo "title=${RELEASE_TAG} - ${TITLE}" >> $GITHUB_OUTPUT
          else
            echo "title=${RELEASE_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare release notes
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            CHANGELOG=$(cat CHANGELOG.md)
          else
            CHANGELOG="Release ${RELEASE_TAG}"
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Collect release files
        id: files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.AppImage.tar.gz' -o -name '*.AppImage.tar.gz.sig' -o -name '*.aab' -o -name '*.ipa' \) -exec cp {} release-files/ \;
          echo "Collected files:"
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ steps.release_title.outputs.title }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: release-files/*

  deploy-google-play:
    name: Upload to Google Play
    needs: [deploy-github-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: android-aab

      - name: Extract version
        id: version
        run: echo "VERSION=${RELEASE_TAG#v}" >> $GITHUB_OUTPUT

      - name: Prepare release notes
        run: |
          mkdir -p play-release-notes
          if [ -f CHANGELOG.md ]; then
            tail -n +7 CHANGELOG.md > play-release-notes/whatsnew-en-US
          else
            echo "Release ${RELEASE_TAG}" > play-release-notes/whatsnew-en-US
          fi

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.parchment
          releaseFiles: android-aab/*.aab
          track: ${{ secrets.GOOGLE_PLAY_TRACK || 'internal' }}
          releaseName: ${{ steps.version.outputs.VERSION }}
          whatsNewDirectory: play-release-notes
          status: completed
        continue-on-error: true

  deploy-app-store:
    name: Upload to App Store
    needs: [deploy-github-release]
    runs-on: macos-latest
    env:
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: ios-ipa

      - name: Upload to App Store Connect
        if: ${{ env.APPLE_API_ISSUER != '' }}
        run: |
          IPA_PATH=$(find ios-ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "Error: IPA file not found"
            exit 1
          fi
          echo "Uploading $IPA_PATH to App Store Connect..."
          xcrun altool --upload-app \
            -t ios \
            -f "$IPA_PATH" \
            --apiKey "${{ secrets.APPLE_API_KEY }}" \
            --apiIssuer "${{ secrets.APPLE_API_ISSUER }}"
