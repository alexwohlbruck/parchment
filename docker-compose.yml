# TODO: Publish images for server parchment-server and parchment-web
volumes:
  server-db:
  server:
  osm-data:

networks:
  default:
    external: true
    name: parchment-network

services:
  # # OSM imported data DB
  # osm-db:
  #   container_name: osm-data
  #   image: postgis/postgis:latest
  #   environment:
  #     POSTGRES_DB: osm_data
  #     POSTGRES_USER: osm_user
  #     POSTGRES_PASSWORD: osm_password
  #   volumes:
  #     - osm-db:/var/lib/postgresql/data
  #   ports:
  #     - '5433:5432'

  # Parchment backend server DB
  server-db:
    container_name: server-db
    image: postgres:latest
    environment:
      POSTGRES_DB: parchment
      POSTGRES_USER: server_user
      POSTGRES_PASSWORD: server_password
    volumes:
      - server-db:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  # Parchment backend (Elysia)
  server:
    container_name: parchment-server
    build:
      context: .
      dockerfile: server/${DOCKERFILE:-Dockerfile.prod}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOCAL_ROUTING_ENGINE: 'graphhopper'
      EXTERNAL_ROUTING_ENGINE_URL: 'https://api.openrouteservice.org/v2/directions/driving-car'
      EXTERNAL_ROUTING_API_KEY: 'your-external-api-key'
      STANDARD_RESPONSE_FORMAT: 'true'
    ports:
      - '5000:5000' # Expose backend to host
      - '${BUN_DEBUG_PORT}:6499' # Bun debugger
    depends_on:
      - server-db
    #   - pelias-api
    #   - opensearch
    #   - graphhopper
    #   - martin
    volumes:
      - ./server:/app/server
      - /app/server/node_modules

  # Web frontend (Vue)
  web:
    container_name: parchment-web
    build:
      context: .
      dockerfile: web/${DOCKERFILE:-Dockerfile.prod}
    environment:
      - VITE_SERVER_ORIGIN=${VITE_SERVER_ORIGIN:-http://localhost:5000}
      - VITE_PORT=${VITE_PORT}
    ports:
      - '5173:${VITE_PORT:-5173}'
    volumes:
      - ./web:/app/web
      - /app/web/node_modules
      - ./server/src/types:/app/server/src/types
    depends_on:
      - server
